<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Conversor Decimal</title>
</head>
<body>

    <div class="container">
        <header>
            <h1>CONVERSOR DECIMAL</h1>
        </header>
        <nav>
            <button class="button-nav" type="button" >Numeros</button>
            <button class="button-nav" type="button">Temperatura</button>
            <button class="button-nav" type="button">Moeda</button>
        </nav>
        <main>
            <section id="numeros">
                <input class="input-1" type="number" placeholder="digite um numero">
                <button type="button">converter</button>
                <h2>Binario</h2>
                <p id="resultado-binario">-</p>
                <h2>Octal</h2>
                <p id="resultado-octal">-</p>
                <h2>Hexadecimal</h2>
                <p id="resultado-hexadecimal">-</p>
                <h2>Romano</h2>
                <p id="resultado-romano">-</p>
            </section>
            <section id="temperatura">
                <h2>Celsius</h2>
                <input class="input-1" type="number" placeholder="Celsius">
                <p id="resultado-celsius">-</p>
                <h2>Kelvin</h2>
                <input class="input-1" type="number" placeholder="Kelvin">
                <p id="resultado-kelvin">-</p>
                <h2>Fahrenheit</h2>
                <input class="input-1" type="number" placeholder="Fahrenheit">
                <p id="resultado-fahrenheit">-</p>
            </section>
        </main>
    </div>
</body>
</html>
