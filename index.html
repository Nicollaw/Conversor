<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Huninn&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Mulish:ital,wght@0,200..1000;1,200..1000&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Truculenta:opsz,wght@12..72,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Conversor Decimal</title>
</head>
<body>

    <div class="container">
        <header>
            <h1>Metric Hub</h1>
        </header>
     
        <main>
            <h2 class="title">O que vamos converter hoje?</h2>
            <section class="menu menu-ativo">
                <button class="button-nav" data-target="numeros" type="button">Numeros</button>
                <button class="button-nav" data-target="temperatura" type="button">Temperatura</button>
                <button class="button-nav" data-target="moeda" type="button">Moeda</button>
                <button class="button-nav" data-target="velocidade" type="button">Velocidade</button>
                <button class="button-nav" data-target="peso" type="button">Peso</button>
                <button class="button-nav" data-target="armazenamento" type="button">Armazenamento</button>
                <button class="button-nav" data-target="tempo" type="button">Tempo</button>
                <button class="button-nav" data-target="comprimento" type="button">Comprimento</button>
            </section>

            <section id="numeros" class="hide">
                <button class="back-menu" data-target="" type="button">Voltar</button>
                <button id="converter-btn" type="button">Converter</button>
                <input  id="input-btn-number" class="input-number" type="number" placeholder="numero">
                <div class="d4">
                <h2>Binario</h2>
                <p id="resultado-binario">-</p>
                <h2>Octal</h2>
                <p id="resultado-octal">-</p>
                <h2>Hexadecimal</h2>
                <p id="resultado-hexadecimal">-</p>
                <h2>Romano</h2>
                <p id="resultado-romano">-</p>
                </div>
            </section>

            <section id="temperatura" class="hide">
                <button class="back-menu" data-target="" type="button">Voltar</button>
                <h2>Celsius</h2>
                <input id="input-celsius" class="input-1" type="number" placeholder="Celsius">
                <h2>Kelvin</h2>
                <input id="input-kelvin" class="input-1" type="number" placeholder="Kelvin">
                <h2>Fahrenheit</h2>
                <input id="input-fahrenheit" class="input-1" type="number" placeholder="Fahrenheit">
            </section>
            <section id="moeda" class="hide">
                <button class="back-menu" data-target="" type="button">Voltar</button>
            </section>
            <section id="velocidade" class="hide">
                <button class="back-menu" data-target="" type="button">Voltar</button>
                <h2>KM/H</h2>
                <input id="input-kmh" class="input-1" type="number" placeholder="Quilômetro por hora (km/h)">
                <h2>M/S</h2>
                <input id="input-ms" class="input-1" type="number" placeholder="Metro por segundo (m/s)">
                <h2>FT/S</h2>
                <input id="input-fts" class="input-1" type="number" placeholder="Pés por segundo (ft/s)">
                <h2>MPH</h2>
                <input id="input-mph" class="input-1" type="number" placeholder="Milha por hora (mph)">
                <h2>KN</h2>
                <input id="input-kn" class="input-1" type="number" placeholder="Nó (kn)">

            </section>
            <section id="peso" class="hide">
                <button class="back-menu" data-target="" type="button">Voltar</button>
                <h2>Kilograma</h2>
                <input id="input-kg" class="input-1" type="number" placeholder="Quilograma (kg)">
                <h2>Grama</h2>
                <input id="input-g" class="input-1" type="number" placeholder="Grama (g)">
                <h2>Miligrama</h2>
                <input id="input-mg" class="input-1" type="number" placeholder="Miligrama (mg)">
                <h2>Tonelada métrica</h2>
                <input id="input-t" class="input-1" type="number" placeholder="Tonelada métrica (t)">
                <h2>Libra</h2>
                <input id="input-lb" class="input-1" type="number" placeholder="Libra (lb)">
                <h2>Onça</h2>
                <input id="input-oz" class="input-1" type="number" placeholder="Onça (oz)">

            </section>
            <section id="armazenamento" class="hide">
                <button class="back-menu" data-target="" type="button">Voltar</button>
                <h2>Bit</h2>
                <input id="input-bit" class="input-1" type="number" placeholder="Bit">
                <h2>Byte</h2>
                <input id="input-b" class="input-1" type="number" placeholder="Byte">
                <h2>Kilobyte</h2>
                <input id="input-kb" class="input-1" type="number" placeholder="Kilobyte (KB)">
                <h2>Megabyte</h2>
                <input id="input-mb" class="input-1" type="number" placeholder="Megabyte (MB)">
                <h2>Gigabyte</h2>
                <input id="input-gb" class="input-1" type="number" placeholder="Megabyte (GB)">
                <h2>Terabyte</h2>
                <input id="input-tb" class="input-1" type="number" placeholder="Terabyte (TB)">
            </section>

            <section id="tempo" class="hide">
                <button class="back-menu" data-target="" type="button">Voltar</button>
            </section>

            <section id="comprimento" class="hide">
                <button class="back-menu" data-target="" type="button">Voltar</button>
            </section>
        
        
        
        
        
        
        
        
        
        
        
        
        </main>
    </div>
    <script src="script.js"></script>
</body>
</html>
